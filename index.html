<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {

  html, body { height: 100%; }

  .voice-bar:nth-child(1){height:6px;animation-delay:0s}.voice-bar:nth-child(2){height:10px;animation-delay:.1s}.voice-bar:nth-child(3){height:16px;animation-delay:.2s}.voice-bar:nth-child(4){height:22px;animation-delay:.3s}.voice-bar:nth-child(5){height:14px;animation-delay:.15s}.voice-bar:nth-child(6){height:18px;animation-delay:.25s}.voice-bar:nth-child(7){height:10px;animation-delay:.05s}.voice-bar:nth-child(8){height:8px;animation-delay:.35s}.voice-bar:nth-child(9){height:14px;animation-delay:.1s}.voice-bar:nth-child(10){height:6px;animation-delay:.2s}

  .msg-time { font-size:11px;color:rgba(148,163,184,0.45);padding:0 4px; }

  .input-bar { background:rgba(255,255,255,0.03);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:10px 14px 28px;display:flex;align-items:flex-end;gap:6px;flex-shrink:0;position:relative;z-index:20; }
  .icon-btn { width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;margin-bottom:2px;transition:background 0.15s,border-color 0.15s;user-select:none; }

  .input-wrap { flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:22px;padding:9px 14px;font-size:14px;color:var(--text-primary);font-family:inherit;min-height:38px;max-height:120px;overflow-y:auto;resize:none;outline:none;line-height:1.5;transition:border-color 0.2s,background 0.2s; }

  .more-panel { position:absolute;bottom:76px;left:10px;background:rgba(8,14,28,0.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.1);border-radius:18px;z-index:25;padding:14px 16px 16px;box-shadow:0 -8px 40px rgba(0,0,0,0.5);transform-origin:bottom left;transition:opacity 0.18s,transform 0.18s; }

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

const LS={get:k=>{try{return localStorage.getItem(k)}catch(e){return null}},set:(k,v)=>{try{localStorage.setItem(k,v)}catch(e){}}}
let currentBg=LS.get('mmy_bg')||'none',bgBlur=parseInt(LS.get('mmy_blur')||'0'),bgOpacity=parseInt(LS.get('mmy_opacity')||'80')
let avatarDataUrl=LS.get('mmy_avatar')||null,userAvatarDataUrl=LS.get('mmy_user_avatar')||null
let customStickers=[];try{customStickers=JSON.parse(LS.get('mmy_stickers')||'[]')}catch(e){}

const $=id=>document.getElementById(id)
const messages=$('messages'),phoneBg=$('phoneBg'),callOverlay=$('callOverlay')
const callTimer=$('callTimer'),callStatusTxt=$('callStatusTxt')

function updateClock(){const n=new Date();$('statusTime').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')}
updateClock();setInterval(updateClock,10000)
function getNow(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}

function applyAvatar(url){
  const ht=$('avatarHeaderText'),hEl=$('avatarHeaderEl'),pt=$('avatarPreviewText'),pEl=$('avatarPreviewLg')
  if(url){
    ht.style.display='none';let i=hEl.querySelector('img');if(!i){i=document.createElement('img');hEl.appendChild(i)}i.src=url
    pt.style.display='none';let pi=pEl.querySelector('img');if(!pi){pi=document.createElement('img');pEl.appendChild(pi)}pi.src=url
    document.querySelectorAll('.avatar.ai').forEach(av=>{av.innerHTML=`<img src="${url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`})
    const ca=$('callAvatarBig');ca.innerHTML=`<img src="${url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
  }else{
    ht.style.display='';const hi=hEl.querySelector('img');if(hi)hi.remove()
    pt.style.display='';const pi=pEl.querySelector('img');if(pi)pi.remove()
    document.querySelectorAll('.avatar.ai').forEach(av=>{av.innerHTML='<span>言</span>'})
    $('callAvatarBig').innerHTML='<span>言</span>'
  }
}
if(avatarDataUrl)applyAvatar(avatarDataUrl)

function applyUserAvatar(url){
  const pEl=$('userAvatarPreviewLg'),pt=$('userAvatarPreviewText')
  if(url){
    pt.style.display='none';let i=pEl.querySelector('img');if(!i){i=document.createElement('img');pEl.appendChild(i)}i.src=url
    document.querySelectorAll('.avatar.user img').forEach(im=>im.src=url)
    const vs=$('videoSelfInner');if(vs){vs.innerHTML=`<img src="${url}" style="width:100%;height:100%;object-fit:cover;">`;vs.style.fontSize='0'}
  }else{
    pt.style.display='';const i=pEl.querySelector('img');if(i)i.remove()
    document.querySelectorAll('.avatar.user').forEach(av=>{av.innerHTML='🐱'})
    const vs=$('videoSelfInner');if(vs){vs.innerHTML='🐱';vs.style.fontSize=''}
  }
}
if(userAvatarDataUrl)applyUserAvatar(userAvatarDataUrl)

$('userAvatarInput').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{userAvatarDataUrl=ev.target.result;LS.set('mmy_user_avatar',userAvatarDataUrl);applyUserAvatar(userAvatarDataUrl)};r.readAsDataURL(f);e.target.value=''})
$('avatarInput').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{avatarDataUrl=ev.target.result;LS.set('mmy_avatar',avatarDataUrl);applyAvatar(avatarDataUrl)};r.readAsDataURL(f);e.target.value=''})
$('userAvatarResetBtn').addEventListener('click',()=>{userAvatarDataUrl=null;LS.set('mmy_user_avatar','');applyUserAvatar(null)})
$('avatarResetBtn').addEventListener('click',()=>{avatarDataUrl=null;LS.set('mmy_avatar','');applyAvatar(null)})

const BG_PRESETS=[
  {id:'none',label:'默认',style:'#0a0f1e'},{id:'cosmos',label:'星空',style:'linear-gradient(160deg,#0d1b4b 0%,#0a0f1e 40%,#1a0933 100%)'},
  {id:'aurora',label:'极光',style:'linear-gradient(160deg,#001a20 0%,#003322 40%,#1a0040 100%)'},{id:'dawn',label:'晨曦',style:'linear-gradient(160deg,#0d1b3e 0%,#1a1040 50%,#2d0b33 100%)'},
  {id:'ocean',label:'深海',style:'linear-gradient(160deg,#001433 0%,#002244 50%,#001122 100%)'},{id:'dusk',label:'暮色',style:'linear-gradient(160deg,#0d0d1e 0%,#1a0d2e 40%,#0d1a1e 100%)'},
]
function applyBackground(id,isImage,url){
  if(id==='none'&&!isImage){phoneBg.style.backgroundImage='none';phoneBg.style.opacity='0';return}
  if(isImage&&url){phoneBg.style.backgroundImage=`url(${url})`}
  else{const p=BG_PRESETS.find(x=>x.id===id);if(!p)return;phoneBg.style.backgroundImage=p.style.startsWith('#')?'none':p.style;phoneBg.style.backgroundColor=p.style.startsWith('#')?p.style:'transparent';if(id==='none'){phoneBg.style.opacity='0';return}}
  phoneBg.style.opacity=bgOpacity/100;phoneBg.style.filter=`blur(${bgBlur}px)`
}
function renderBgPresets(){
  const el=$('bgPresets');el.innerHTML=''
  BG_PRESETS.forEach(p=>{const d=document.createElement('div');d.className='bg-preset-item'+(currentBg===p.id?' selected':'');d.style.background=p.style;d.title=p.label;d.innerHTML=`<div class="check"><svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;d.addEventListener('click',()=>{currentBg=p.id;LS.set('mmy_bg',p.id);LS.set('mmy_bg_custom','');applyBackground(p.id,false,null);renderBgPresets()});el.appendChild(d)})
  const ut=document.createElement('div'),sc=LS.get('mmy_bg_custom')
  if(sc&&currentBg==='custom'){ut.className='bg-preset-item selected';ut.style.cssText=`aspect-ratio:9/16;border-radius:10px;cursor:pointer;background-image:url(${sc});background-size:cover;background-position:center;position:relative;border:2px solid var(--blue);`;ut.innerHTML=`<div class="check" style="opacity:1"><svg width="10" height="10" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`}
  else{ut.className='bg-upload-tile';ut.innerHTML=`<svg fill="none" stroke="rgba(148,163,184,0.5)" stroke-width="2" viewBox="0 0 24 24" width="18" height="18"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke-linecap="round" stroke-linejoin="round"/></svg><span>自定义</span>`}
  ut.addEventListener('click',()=>$('bgUploadInput').click());el.appendChild(ut)
}
renderBgPresets()
const scb=LS.get('mmy_bg_custom')
if(currentBg==='custom'&&scb)applyBackground('custom',true,scb);else if(currentBg!=='none')applyBackground(currentBg,false,null)
$('bgUploadInput').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const d=ev.target.result;currentBg='custom';LS.set('mmy_bg','custom');LS.set('mmy_bg_custom',d);applyBackground('custom',true,d);renderBgPresets()};r.readAsDataURL(f);e.target.value=''})

const blurSlider=$('blurSlider'),opacitySlider=$('opacitySlider'),blurVal=$('blurVal'),opacityVal=$('opacityVal')
blurSlider.value=bgBlur;opacitySlider.value=bgOpacity;blurVal.textContent=bgBlur;opacityVal.textContent=bgOpacity
blurSlider.addEventListener('input',()=>{bgBlur=parseInt(blurSlider.value);blurVal.textContent=bgBlur;LS.set('mmy_blur',bgBlur);phoneBg.style.filter=`blur(${bgBlur}px)`})
opacitySlider.addEventListener('input',()=>{bgOpacity=parseInt(opacitySlider.value);opacityVal.textContent=bgOpacity;LS.set('mmy_opacity',bgOpacity);if(currentBg!=='none')phoneBg.style.opacity=bgOpacity/100})

function closeAllPanels(){$('stickerPanel').classList.add('hidden');$('stickerBtn').classList.remove('active');$('morePanel').classList.add('hidden');$('moreBtn').classList.remove('active')}
$('settingsBtn').addEventListener('click',()=>{$('settingsOverlay').classList.add('open');closeAllPanels()})
$('settingsBackdrop').addEventListener('click',()=>$('settingsOverlay').classList.remove('open'))
$('sheetCloseBtn').addEventListener('click',()=>$('settingsOverlay').classList.remove('open'))
$('stickerBtn').addEventListener('click',e=>{e.stopPropagation();const o=!$('stickerPanel').classList.contains('hidden');closeAllPanels();if(!o){$('stickerPanel').classList.remove('hidden');$('stickerBtn').classList.add('active')}})
$('moreBtn').addEventListener('click',e=>{e.stopPropagation();const o=!$('morePanel').classList.contains('hidden');closeAllPanels();if(!o){$('morePanel').classList.remove('hidden');$('moreBtn').classList.add('active')}})
document.addEventListener('click',e=>{if(!$('stickerPanel').contains(e.target)&&e.target!==$('stickerBtn')&&!$('morePanel').contains(e.target)&&e.target!==$('moreBtn'))closeAllPanels()})

function makeAv(isUser){
  const d=document.createElement('div');d.className='avatar '+(isUser?'user':'ai')
  if(isUser){if(userAvatarDataUrl)d.innerHTML=`<img src="${userAvatarDataUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;else d.textContent='🐱'}
  else{if(avatarDataUrl)d.innerHTML=`<img src="${avatarDataUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;else d.innerHTML='<span>言</span>'}
  return d
}
const readObserver=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      const timeEl=entry.target.querySelector('.msg-time')
      if(timeEl&&timeEl.textContent.includes('未读'))timeEl.textContent=timeEl.textContent.replace('未读','已读')
      readObserver.unobserve(entry.target)
    }
  })
},{root:messages,threshold:0.8})

function appendRow(bubble,isUser){
  const row=document.createElement('div');row.className='msg-row'+(isUser?' user':'')
  const body=document.createElement('div');body.className='msg-body'
  const timeStr=new Date().toLocaleTimeString('zh',{hour:'2-digit',minute:'2-digit'})
  const time=document.createElement('span');time.className='msg-time'
  time.textContent=isUser?timeStr+' · 未读':timeStr
  body.appendChild(bubble);body.appendChild(time)
  row.appendChild(makeAv(isUser));row.appendChild(body)
  messages.appendChild(row);messages.scrollTop=messages.scrollHeight
  if(isUser)readObserver.observe(row)
}

const STICKER_CATS=[
  {icon:'🐱',label:'可爱',stickers:['🥺','🥹','😭','😍','🤭','😳','🫣','😏','🙈','💀','🫠','😴','🤔','😤','🤩','😋','🫡','😬','🙊','😶']},
  {icon:'💕',label:'爱心',stickers:['❤️','🧡','💛','💚','💙','💜','🖤','🤍','💗','💓','💞','💖','💘','💝','💟','♥️','🫶','💑','👫','🌹']},
  {icon:'🐾',label:'动物',stickers:['🐱','🐶','🐼','🐨','🦊','🐰','🐸','🐟','🐧','🦋','🐯','🐻','🦁','🐮','🐷','🐙','🦀','🐠','🦔','🐿️']},
  {icon:'✨',label:'魔法',stickers:['✨','⭐','🌟','💫','🌙','🌸','🍀','🌺','🌊','🍁','🎉','🎊','🎶','🔥','💯','🫧','🌈','☁️','❄️','🍄']},
]
let activeStickerCat=0
function renderStickerTabs(){
  const st=$('stickerTabs');st.innerHTML=''
  STICKER_CATS.forEach((cat,i)=>{const b=document.createElement('button');b.className='sticker-tab'+(i===activeStickerCat?' active':'');b.textContent=cat.icon;b.title=cat.label;b.addEventListener('click',()=>{activeStickerCat=i;renderStickerTabs();renderStickerItems()});st.appendChild(b)})
  const mb=document.createElement('button');mb.className='sticker-tab'+(activeStickerCat===99?' active':'');mb.textContent='📁';mb.title='我的贴纸';mb.addEventListener('click',()=>{activeStickerCat=99;renderStickerTabs();renderStickerItems()});st.appendChild(mb)
}
function sendSticker(type,value){
  const b=document.createElement('div');b.className='bubble user sticker'
  if(type==='emoji'){const sp=document.createElement('span');sp.className='sticker-emoji';sp.textContent=value;b.appendChild(sp)}
  else{const img=document.createElement('img');img.src=value;img.alt='贴纸';b.appendChild(img)}
  appendRow(b,true);closeAllPanels()
  setTimeout(()=>{const picks=['🥺','🥹','🫣','💕','😍','🌸','✨','🐱','💀','🫶'];const rb=document.createElement('div');rb.className='bubble ai sticker';const sp=document.createElement('span');sp.className='sticker-emoji';sp.textContent=picks[Math.floor(Math.random()*picks.length)];rb.appendChild(sp);appendRow(rb,false)},800+Math.random()*600)
}
function renderStickerItems(){
  const sg=$('stickerGrid');sg.innerHTML=''
  if(activeStickerCat===99){
    const ui=document.createElement('div');ui.className='sticker-upload-item';ui.innerHTML=`<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke-linecap="round" stroke-linejoin="round"/></svg><span>添加</span>`;ui.addEventListener('click',()=>$('stickerUploadInput').click());sg.appendChild(ui)
    customStickers.forEach(src=>{const item=document.createElement('div');item.className='sticker-item';const img=document.createElement('img');img.src=src;img.alt='贴纸';item.appendChild(img);item.addEventListener('click',()=>sendSticker('image',src));sg.appendChild(item)})
  }else{STICKER_CATS[activeStickerCat].stickers.forEach(s=>{const item=document.createElement('div');item.className='sticker-item';item.textContent=s;item.addEventListener('click',()=>sendSticker('emoji',s));sg.appendChild(item)})}
}
renderStickerTabs();renderStickerItems()
$('stickerUploadInput').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{customStickers.push(ev.target.result);LS.set('mmy_stickers',JSON.stringify(customStickers));renderStickerItems()};r.readAsDataURL(f);e.target.value=''})

$('moImg').addEventListener('click',()=>{$('imageInput').click();closeAllPanels()})
$('imageInput').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return
  const r=new FileReader();r.onload=ev=>{
    const b=document.createElement('div');b.className='bubble user image'
    const img=document.createElement('img');img.src=ev.target.result;img.alt='图片'
    img.addEventListener('click',()=>{$('lightboxImg').src=img.src;$('lightbox').classList.add('open')})
    b.appendChild(img);appendRow(b,true)
    setTimeout(()=>{const rb=document.createElement('div');rb.className='bubble ai';rb.textContent=['好好看！🥹','土豆吗？🐱','猫猫拍的？','收下了 💕','哇 ✨'][Math.floor(Math.random()*5)];appendRow(rb,false)},900+Math.random()*600)
  };r.readAsDataURL(f);e.target.value=''
})

$('moFile').addEventListener('click',()=>{$('fileInput').click();closeAllPanels()})
$('fileInput').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return
  const b=document.createElement('div');b.className='bubble user file'
  const iw=document.createElement('div');iw.className='file-icon-wrap';iw.innerHTML=`<svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`
  const meta=document.createElement('div');meta.className='file-meta'
  const nm=document.createElement('div');nm.className='file-name';nm.textContent=f.name
  const sz=document.createElement('div');sz.className='file-size';sz.textContent=f.size<1024*1024?(f.size/1024).toFixed(1)+' KB':(f.size/1024/1024).toFixed(1)+' MB'
  meta.appendChild(nm);meta.appendChild(sz);b.appendChild(iw);b.appendChild(meta);appendRow(b,true)
  setTimeout(()=>{const rb=document.createElement('div');rb.className='bubble ai';rb.textContent='收到文件了 📁';appendRow(rb,false)},800)
  e.target.value=''
})

let recInterval=null,recSec=0,voiceActive=false
$('moVoice').addEventListener('click',()=>{closeAllPanels();if(voiceActive){stopVoiceRec()}else{startVoiceRec()}})
function startVoiceRec(){
  voiceActive=true;recSec=0
  $('voiceRecBar').classList.remove('hidden')
  $('recTimer').textContent='0:00'
  recInterval=setInterval(()=>{recSec++;$('recTimer').textContent=Math.floor(recSec/60)+':'+String(recSec%60).padStart(2,'0');if(recSec>=60)stopVoiceRec()},1000)
}
function stopVoiceRec(){
  if(!voiceActive)return;voiceActive=false;clearInterval(recInterval)
  $('voiceRecBar').classList.add('hidden')
  const dur=recSec;if(dur<1)return
  sendVoiceBubble(dur,true)
  setTimeout(()=>sendVoiceBubble(Math.floor(Math.random()*10)+2,false),1000+Math.random()*600)
}
function sendVoiceBubble(secs,isUser){
  const b=document.createElement('div');b.className='bubble '+(isUser?'user':'ai')+' voice'
  const pb=document.createElement('div');pb.className='voice-play-btn';pb.innerHTML=`<svg fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`
  const wv=document.createElement('div');wv.className='voice-waves'
  for(let i=0;i<10;i++){const bar=document.createElement('div');bar.className='voice-bar';wv.appendChild(bar)}
  const dur=document.createElement('span');dur.className='voice-dur';dur.textContent=Math.floor(secs/60)+':'+String(secs%60).padStart(2,'0')
  b.appendChild(pb);b.appendChild(wv);b.appendChild(dur);appendRow(b,isUser)
}

let callInterval=null,callSec=0,isMuted=false
function startCall(video){
  callOverlay.classList.toggle('video-mode',video)
  $('callModeLabel').textContent=video?'视频通话':'语音通话'
  callStatusTxt.textContent='正在呼叫…';callTimer.classList.remove('visible')
  callOverlay.classList.add('open');closeAllPanels();$('settingsOverlay').classList.remove('open')
  setTimeout(()=>{
    callStatusTxt.textContent='通话中';callTimer.classList.add('visible');callSec=0;callTimer.textContent='0:00'
    callInterval=setInterval(()=>{callSec++;callTimer.textContent=Math.floor(callSec/60)+':'+String(callSec%60).padStart(2,'0')},1000)
  },2000)
}
function endCall(){clearInterval(callInterval);callInterval=null;callOverlay.classList.remove('open');callTimer.classList.remove('visible');isMuted=false;$('callMuteIcon').classList.remove('muted')}
$('voiceCallBtn').addEventListener('click',()=>startCall(false))
$('videoCallBtn').addEventListener('click',()=>startCall(true))
$('callEndBtn').addEventListener('click',endCall)
$('callMinBtn').addEventListener('click',endCall)
$('callMuteBtn').addEventListener('click',()=>{isMuted=!isMuted;$('callMuteIcon').classList.toggle('muted',isMuted)})
$('callCamBtn').addEventListener('click',()=>{const ci=$('callCamIcon');ci.classList.toggle('muted')})

$('lightboxClose').addEventListener('click',()=>$('lightbox').classList.remove('open'))
$('lightbox').addEventListener('click',e=>{if(e.target===$('lightbox'))$('lightbox').classList.remove('open')})

const inputField=$('inputField')
function autoResize(){inputField.style.height='auto';inputField.style.height=Math.min(inputField.scrollHeight,120)+'px'}
inputField.addEventListener('input',autoResize)
const WS_URL = 'wss://harmonious-perception-production-9bea.up.railway.app';
let ws = null;
let currentAiBubble = null;

function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onmessage = (e) => {
    console.log('[WS recv]', e.data);
    const msg = JSON.parse(e.data);
    if (msg.type === 'token') {
      if (!currentAiBubble) {
        currentAiBubble = document.createElement('div');
        currentAiBubble.className = 'bubble ai';
        appendRow(currentAiBubble, false);
      }
      currentAiBubble.textContent += msg.text;
      messages.scrollTop = messages.scrollHeight;
    } else if (msg.type === 'done') {
      currentAiBubble = null;
    }
  };
  ws.onclose = () => setTimeout(connectWS, 2000);
  ws.onerror = () => ws.close();
}

connectWS();

function doSend() {
  const text = inputField.value.trim();
  if (!text) return;
  const b = document.createElement('div');
  b.className = 'bubble user';
  b.textContent = text;
  appendRow(b, true);
  inputField.value = '';
  inputField.style.height = 'auto';
  if (ws && ws.readyState === WebSocket.OPEN) {
    const tr = document.createElement('div'); tr.className = 'typing-row'; tr.id = 'typingIndicator';
    const tb = document.createElement('div'); tb.className = 'typing-bubble'; tb.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    tr.appendChild(makeAv(false)); tr.appendChild(tb); messages.appendChild(tr); messages.scrollTop = messages.scrollHeight;
    const payload = JSON.stringify({ type: 'chat', text });
    console.log('[WS send]', payload);
    ws.send(payload);
  }
}
$('sendBtn').addEventListener('click',doSend)
inputField.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend()}})

let channels=[];try{channels=JSON.parse(LS.get('mmy_channels')||'[]')}catch(e){}
if(!channels.length)channels=[{id:'daily',name:'日常'},{id:'work',name:'工作'}]
let activeChannelId=LS.get('mmy_active_channel')||channels[0].id
if(!channels.find(c=>c.id===activeChannelId))activeChannelId=channels[0].id
let channelMessages={};try{channelMessages=JSON.parse(LS.get('mmy_ch_msgs')||'{}')}catch(e){}

function saveChannels(){LS.set('mmy_channels',JSON.stringify(channels))}
function saveChannelMessages(){channelMessages[activeChannelId]=messages.innerHTML;LS.set('mmy_ch_msgs',JSON.stringify(channelMessages))}

function switchChannel(id){
  channelMessages[activeChannelId]=messages.innerHTML
  activeChannelId=id;LS.set('mmy_active_channel',id)
  if(channelMessages[id]){messages.innerHTML=channelMessages[id]}
  else{messages.innerHTML='<div class="date-chip"><span>今天</span></div>'}
  messages.scrollTop=messages.scrollHeight
  renderChannelTabs()
  LS.set('mmy_ch_msgs',JSON.stringify(channelMessages))
}

function renderChannelTabs(){
  const bar=$('channelBar');bar.innerHTML=''
  channels.forEach(ch=>{
    const tab=document.createElement('div')
    tab.className='channel-tab'+(ch.id===activeChannelId?' active':'')
    tab.textContent=ch.name
    if(channels.length>1){
      const closeBtn=document.createElement('button')
      closeBtn.className='tab-close';closeBtn.textContent='×'
      closeBtn.addEventListener('click',e=>{
        e.stopPropagation()
        if(channels.length<=1)return
        channels=channels.filter(c=>c.id!==ch.id)
        delete channelMessages[ch.id]
        saveChannels();saveChannelMessages()
        if(activeChannelId===ch.id)switchChannel(channels[0].id)
        else renderChannelTabs()
      })
      tab.appendChild(closeBtn)
    }
    tab.addEventListener('click',()=>{if(ch.id!==activeChannelId)switchChannel(ch.id)})
    tab.addEventListener('dblclick',e=>{
      e.preventDefault()
      const input=document.createElement('input')
      input.value=ch.name;input.style.width=Math.max(ch.name.length*14,36)+'px'
      tab.textContent='';tab.appendChild(input);input.focus();input.select()
      const finish=()=>{const v=input.value.trim();if(v)ch.name=v;saveChannels();renderChannelTabs()}
      input.addEventListener('blur',finish)
      input.addEventListener('keydown',ev=>{if(ev.key==='Enter'){ev.preventDefault();input.blur()}})
    })
    bar.appendChild(tab)
  })
  const addBtn=document.createElement('div')
  addBtn.className='channel-tab-add'
  addBtn.innerHTML='<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'
  addBtn.addEventListener('click',()=>{const id='ch_'+Date.now();channels.push({id,name:'新窗口'});saveChannels();switchChannel(id)})
  bar.appendChild(addBtn)
}
renderChannelTabs()
if(channelMessages[activeChannelId])messages.innerHTML=channelMessages[activeChannelId]
setInterval(()=>{channelMessages[activeChannelId]=messages.innerHTML;LS.set('mmy_ch_msgs',JSON.stringify(channelMessages))},3000)

let memories=[];try{memories=JSON.parse(LS.get('mmy_memories')||'[]')}catch(e){}
function saveMemories(){LS.set('mmy_memories',JSON.stringify(memories))}
function renderMemories(){
  const list=$('memoryList');list.innerHTML=''
  if(!memories.length){list.innerHTML='<div class="memory-empty"><div class="memory-empty-icon">🧠</div>还没有记忆<br>添加一些让言记住的事吧</div>';return}
  memories.forEach((mem,i)=>{
    const item=document.createElement('div');item.className='memory-item'
    const icon=document.createElement('div');icon.className='memory-icon'
    icon.innerHTML='<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a7 7 0 017 7c0 2.38-1.19 4.47-3 5.74V17a2 2 0 01-2 2H10a2 2 0 01-2-2v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 017-7z"/></svg>'
    const content=document.createElement('div');content.className='memory-content'
    const text=document.createElement('div');text.className='memory-text';text.textContent=mem.text
    const time=document.createElement('div');time.className='memory-time';time.textContent=mem.time||''
    content.appendChild(text);content.appendChild(time)
    const actions=document.createElement('div');actions.className='memory-actions'
    const editBtn=document.createElement('button');editBtn.className='memory-action-btn'
    editBtn.innerHTML='<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>'
    editBtn.addEventListener('click',()=>{
      text.contentEditable='true';text.focus()
      const range=document.createRange();range.selectNodeContents(text);const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range)
      const done=()=>{text.contentEditable='false';const v=text.textContent.trim();if(v){mem.text=v;saveMemories()}else{memories.splice(i,1);saveMemories();renderMemories()}}
      text.addEventListener('blur',done,{once:true})
      text.addEventListener('keydown',ev=>{if(ev.key==='Enter'){ev.preventDefault();text.blur()}})
    })
    const delBtn=document.createElement('button');delBtn.className='memory-action-btn del'
    delBtn.innerHTML='<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>'
    delBtn.addEventListener('click',()=>{memories.splice(i,1);saveMemories();renderMemories()})
    actions.appendChild(editBtn);actions.appendChild(delBtn)
    item.appendChild(icon);item.appendChild(content);item.appendChild(actions)
    list.appendChild(item)
  })
}
function addMemory(text){
  if(!text.trim())return
  const now=new Date()
  const timeStr=now.getFullYear()+'/'+String(now.getMonth()+1).padStart(2,'0')+'/'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')
  memories.unshift({text:text.trim(),time:timeStr})
  saveMemories();renderMemories()
}
$('memoryBtn').addEventListener('click',()=>{$('memoryOverlay').classList.add('open');renderMemories();closeAllPanels()})
$('memoryBackdrop').addEventListener('click',()=>$('memoryOverlay').classList.remove('open'))
$('memoryCloseBtn').addEventListener('click',()=>$('memoryOverlay').classList.remove('open'))
$('memoryAddBtn').addEventListener('click',()=>{const inp=$('memoryAddInput');addMemory(inp.value);inp.value=''})
$('memoryAddInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();const inp=$('memoryAddInput');addMemory(inp.value);inp.value=''}})
</script>
